{% set name = "itemadapter" %}
{% set version = "0.12.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: a0431fe5b3f9d95b7e9a20e05789672bc733c173d9989dc9d515ba6b0b9b6a08

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  skip: true  # [py<39]

requirements:
  host:
    - python
    - pip
    - hatchling
  run:
    - python
    # Optional dependencies
    #- scrapy # needed to interact with scrapy items
    #- attrs # needed to interact with attrs-based items
    #- pydantic # needed to interact with pydantic-based items
  run_constrained:
    - attrs >=20.1.0
    - pydantic >=1.8
    - scrapy >=2.2

test:
  imports:
    - itemadapter
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/scrapy/itemadapter
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Common interface for different data containers
  description: |
    The ItemAdapter class is a wrapper for data container objects, providing a
    common interface to handle objects of different types in an uniform manner,
    regardless of their underlying implementation.
  dev_url: https://github.com/scrapy/itemadapter
  doc_url: https://github.com/scrapy/itemadapter/blob/master/README.md

extra:
  recipe-maintainers:
    - Gallaecio
    - wRAR
    - dangra
    - rmax
